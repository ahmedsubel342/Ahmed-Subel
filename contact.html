    <section class="section"><div class="container"><h2 class="section-title">Let's <span>Connect</span></h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 2.5rem;"><div style="background:#1A1D26; border-radius: 1.5rem; padding: 2rem;"><i class="fas fa-envelope" style="font-size:2rem; color:#E7C24C;"></i><h3>Email</h3><p>ahmed.subel@selfshop.com</p><p>ceo@nayaoutfit.com</p><i class="fas fa-phone-alt" style="font-size:2rem; margin-top:1.5rem; color:#E7C24C;"></i><h3>Phone</h3><p>+880 1700 000 987 (Business)</p><div style="margin-top: 2rem;"><i class="fab fa-linkedin" style="font-size:1.8rem; margin-right:1rem; color:#E7C24C;"></i><i class="fab fa-twitter" style="font-size:1.8rem; color:#E7C24C;"></i></div></div>

    </div></section>

    <script>document.getElementById('contactForm')?.addEventListener('submit', (e) => { e.preventDefault(); document.getElementById('formFeedback').innerHTML = '✓ Thanks! I’ll reply within 24 hours.'; e.target.reset(); });</script>
